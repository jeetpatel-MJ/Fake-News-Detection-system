<!-- templates/login.html -->
{% extends "base.html" %}
{% block content %}
<h2>Login</h2>
<form method="POST">
    {{ form.hidden_tag() }}
    <div>{{ form.email.label }} {{ form.email() }}</div>
    <div>{{ form.password.label }} {{ form.password() }}</div>
    {{ form.submit() }}
</form>
<p>No account? <a href="{{ url_for('register') }}">Register</a></p>
{% endblock %}
